<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <!-- ══════════════════════════════════════════════
         FAVICON — ganti URL di bawah dengan link
         gambar favicon kamu dari Cloudinary
         Contoh: https://res.cloudinary.com/CLOUD_NAME/image/upload/v.../favicon.png
         ══════════════════════════════════════════════ -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/GANTI_CLOUD_NAME/image/upload/portfolio/favicon.png" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/GANTI_CLOUD_NAME/image/upload/portfolio/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══════════════════════════════════════════════
         SEO & DESKRIPSI DASAR
         ══════════════════════════════════════════════ -->
    <title>Faris Al Fatih | Web Developer & Data Engineer</title>
    <meta name="description" content="Portfolio Mohammad Faris Al Fatih — Web Developer & Aspiring Data Engineer dari Gresik, Indonesia. Spesialis React, Node.js, dan PostgreSQL." />
    <meta name="keywords" content="web developer, data engineer, react, nodejs, portfolio, fullstack, gresik, indonesia" />
    <meta name="author" content="Mohammad Faris Al Fatih" />

    <!-- ══════════════════════════════════════════════
         OPEN GRAPH — untuk preview WhatsApp, Facebook, LinkedIn
         Ganti GANTI_CLOUD_NAME dengan Cloud Name Cloudinary kamu
         og:image wajib minimal 600×315px agar tampil di WA
         ══════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Faris Al Fatih Portfolio" />
    <meta property="og:title" content="Faris Al Fatih | Web Developer & Data Engineer" />
    <meta property="og:description" content="Halo! Saya Faris — Web Developer & Aspiring Data Engineer. Lihat project, skill, dan pengalaman saya di sini." />
    <meta property="og:url" content="https://GANTI_DOMAIN_KAMU.com" />
    <meta property="og:image" content="https://res.cloudinary.com/GANTI_CLOUD_NAME/image/upload/c_fill,w_1200,h_630/portfolio/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Faris Al Fatih - Web Developer Portfolio" />
    <meta property="og:locale" content="id_ID" />

    <!-- ══════════════════════════════════════════════
         TWITTER CARD — untuk preview di Twitter/X
         ══════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Faris Al Fatih | Web Developer & Data Engineer" />
    <meta name="twitter:description" content="Halo! Saya Faris — Web Developer & Aspiring Data Engineer. Lihat project, skill, dan pengalaman saya di sini." />
    <meta name="twitter:image" content="https://res.cloudinary.com/GANTI_CLOUD_NAME/image/upload/c_fill,w_1200,h_630/portfolio/og-image.jpg" />

    <!-- Tema warna browser (mobile) -->
    <meta name="theme-color" content="#06b6d4" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
